      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete birth profile
      tags:
      - BirthProfiles
    get:
      consumes:
      - application/json
      description: Get a specific birth profile by its ID
      parameters:
      - description: Birth Profile ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get birth profile by ID
      tags:
      - BirthProfiles
    put:
      consumes:
      - application/json
      description: Update an existing birth profile
      parameters:
      - description: Birth Profile ID
        in: path
        name: id
        required: true
        type: string
      - description: Update birth profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.UpdateBirthProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":

definitions:
  destiny-backend_internal_dto.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 100
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  destiny-backend_internal_dto.CreateBirthProfileRequest:
    properties:
      birth_date:
        type: string
      birth_place:
        type: string
      birth_time:
        type: string
      city:
        type: string
      country:
        type: string
      full_name:
        maxLength: 150
        minLength: 1
        type: string
      gender:
        type: string
      is_unknown_time:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      note:
        type: string
      timezone:
        type: string
    required:
    - birth_date
    - full_name
    - timezone
    type: object
  destiny-backend_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  destiny-backend_internal_dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  destiny-backend_internal_dto.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      password:
        maxLength: 100
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  destiny-backend_internal_dto.TokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
    type: object
  destiny-backend_internal_dto.UpdateBirthProfileRequest:
    properties:
      birth_date:
        type: string
      birth_place:
        type: string
      birth_time:
        type: string
      city:
        type: string
      country:
        type: string
      full_name:
        maxLength: 150
        minLength: 1
        type: string
      gender:
        type: string
      is_unknown_time:
        type: boolean
      latitude:
        type: number
      longitude:
        type: number
      note:
        type: string
      timezone:
        type: string
    type: object
  destiny-backend_internal_dto.UpdateUserRequest:
    properties:
      avatar:
        type: string
      country:
        maxLength: 2
        type: string
      language:
        maxLength: 10
        minLength: 2
        type: string
      name:
        maxLength: 150
        minLength: 2
        type: string
      timezone:
        maxLength: 50
        type: string
    type: object
  destiny-backend_internal_dto.UserResponse:
    properties:
      avatar:
        type: string
      country:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      is_premium:
        type: boolean
      language:
        type: string
      name:
        type: string
      premium_until:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return access/refresh tokens
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/destiny-backend_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate access and refresh tokens
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a refresh token
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/destiny-backend_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and return access/refresh tokens
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/destiny-backend_internal_dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Auth
  /lookup/aspects:
    get:
      consumes:
      - application/json
      description: Get list of aspects
      produces:
      - application/json
      responses:
        "200":
          description: OK

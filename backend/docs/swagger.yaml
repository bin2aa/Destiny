          schema:
            additionalProperties: true
            type: object
      summary: Get zodiac signs
      tags:
      - Lookup
  /profiles:
    get:
      consumes:
      - application/json
      description: Get all birth profiles for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List birth profiles
      tags:
      - BirthProfiles
    post:
      consumes:
      - application/json
      description: Create a new birth profile for the authenticated user
      parameters:
      - description: Create birth profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/destiny-backend_internal_dto.CreateBirthProfileRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":

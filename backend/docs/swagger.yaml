      tags:
      - BirthProfiles
  /profiles/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a birth profile by ID
      parameters:
      - description: Birth Profile ID
        in: path
        name: id
        required: true
        type: string
      produces:
